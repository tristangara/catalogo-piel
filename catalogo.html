<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Bolsas de Piel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100">
    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="bg-white shadow-md p-4 sticky top-0 z-50 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <!-- Logo / Nombre -->
            <a href="index.html" class="text-2xl font-bold tracking-widest text-stone-900">
                PIEL & ESTILO
            </a>
            
            <!-- Enlaces del Menú -->
            <div class="space-x-6 font-semibold">
                <a href="index.html" class="text-stone-500 hover:text-stone-900 transition">Inicio</a>
                <a href="catalogo.html" class="text-stone-900 transition">Catálogo</a>
            </div>
        </div>
    </nav>
    <div class="container mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-10 text-stone-800">Catálogo de Piel</h1>
        <!-- SECCIÓN DEL BUSCADOR -->
    <div class="container mx-auto px-4 mb-8 flex justify-center">
        <input type="text" id="buscador" placeholder="Buscar por color, modelo o estilo..." class="w-full md:w-1/2 p-3 border border-stone-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-stone-600 text-stone-800 transition">
    </div>
        <div id="contenedor-bolsas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </div>

    <script>
    const miWhatsApp = "529512159841"; 
    
    let inventarioGlobal = []; // Arreglo para guardar todas las bolsas

    // 1. Cargar datos de la API
    async function cargarBolsas() {
        try {
            const respuesta = await fetch('https://api-catalogo-bolsas.onrender.com/api/productos');
            inventarioGlobal = await respuesta.json();
            pintarCatalogo(inventarioGlobal); // Pintamos todas al cargar la página
        } catch (error) {
            console.error("Error al conectar con la base de datos:", error);
        }
    }

    
    function pintarCatalogo(bolsasA_Mostrar) {
        
        const contenedor = document.getElementById('contenedor-bolsas'); 
        contenedor.innerHTML = ''; 

        bolsasA_Mostrar.forEach(bolsa => {
            
            if(bolsa.disponible) {
                
                
                const mensaje = `Hola, me interesa la bolsa modelo ${bolsa.nombre} que cuesta $${bolsa.precio}.`;
                
               const tarjeta = `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden border border-stone-200 transition hover:shadow-lg">
                        <img src="${bolsa.url_imagen}" alt="${bolsa.nombre}" class="w-full h-64 object-cover">
                        <div class="p-4">
                            <h3 class="text-xl font-bold text-stone-900 mb-2">${bolsa.nombre}</h3>
                            <p class="text-stone-600 mb-4 text-sm">${bolsa.descripcion}</p>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-xl font-bold text-stone-800">$${bolsa.precio}</span>
                                <a href="https://wa.me/${miWhatsApp}?text=${encodeURIComponent(mensaje)}" target="_blank" class="bg-green-600 text-white font-semibold px-4 py-2 rounded-md hover:bg-green-700 transition">
                                    <i class="fa-brands fa-whatsapp mr-2"></i> Pedir
                                </a>
                            </div>
                        </div>
                    </div>
                `;
                
                contenedor.innerHTML += tarjeta;
            }
        });
    }

    // 3. El evento del buscador (El filtro en tiempo real)
    document.getElementById('buscador').addEventListener('input', (evento) => {
        const texto = evento.target.value.toLowerCase();
        
        const bolsasFiltradas = inventarioGlobal.filter(bolsa => {
            return bolsa.nombre.toLowerCase().includes(texto) || 
                   bolsa.descripcion.toLowerCase().includes(texto);
        });
        
        pintarCatalogo(bolsasFiltradas); // Volvemos a pintar pero solo con las que coincidan
    });

    // Arrancamos el proceso
    cargarBolsas();
    </script>
</body>
</html>
